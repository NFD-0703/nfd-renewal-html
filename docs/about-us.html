<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,follow">
<link rel="alternate" hreflang="en" href="https://www.nfd.kr/en/about-us.html">
<link rel="alternate" hreflang="ko" href="https://www.nfd.kr/ko/about-us.html">
<link rel="alternate" hreflang="x-default" href="https://www.nfd.kr/en/about-us.html">
<title>About Us – NFD Korea</title>
<script>
(function(){
  var page = "about-us.html";
  var saved = localStorage.getItem("nfd_lang");
  var browser = (navigator.languages && navigator.languages[0]) || navigator.language || "";
  var tz = "";
  try { tz = Intl.DateTimeFormat().resolvedOptions().timeZone || ""; } catch(e) {}
  var lang = saved || (/^ko\b/i.test(browser) || tz === "Asia/Seoul" ? "ko" : "en");
  if (lang !== "ko" && lang !== "en") lang = "en";
  location.replace("./" + lang + "/" + page + location.search + location.hash);
}());
</script>
</head>
<body>
<p>Redirecting to <a href="./en/about-us.html">English</a> / <a href="./ko/about-us.html">Korean</a>.</p>
</body>
</html>
